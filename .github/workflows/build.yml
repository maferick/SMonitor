name: Build and Push Docker Image

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check Docker Hub credentials
        id: creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "have_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is not set; skipping image publish."
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.creds.outputs.have_creds == 'true'
        uses: actions/checkout@v4

      - name: Set image tag
        if: steps.creds.outputs.have_creds == 'true'
        id: tag
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH_NAME=${BRANCH_NAME//\//-}
          echo "IMAGE_TAG=$SAFE_BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.creds.outputs.have_creds == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.creds.outputs.have_creds == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.creds.outputs.have_creds == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smonitor:${{ steps.tag.outputs.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
