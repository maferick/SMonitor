name: Build and Push Docker Image

on:
  push:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set image tag
        id: tag
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SAFE_BRANCH_NAME=${BRANCH_NAME//\//-}
          echo "IMAGE_TAG=$SAFE_BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Set image repository (lowercase)
        id: repo
        run: |
          REPO_LC="${GITHUB_REPOSITORY,,}"
          echo "GHCR_REPO=ghcr.io/$REPO_LC" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          TAGS="${{ steps.repo.outputs.GHCR_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}"
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            TAGS="$TAGS,${{ secrets.DOCKERHUB_USERNAME }}/smonitor:${{ steps.tag.outputs.IMAGE_TAG }}"
          fi
          echo "TAGS=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.TAGS }}
