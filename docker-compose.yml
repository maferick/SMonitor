services:
  streamonitor:
    # Default to prebuilt GHCR image (works in Portainer environments where buildx is unavailable).
    image: ${STREAMONITOR_IMAGE:-ghcr.io/lossless1024/streamonitor:latest}
    container_name: streamonitor
    restart: unless-stopped
    environment:
      # Timezone can be overridden from stack.env/.env
      TZ: ${TZ:-Etc/UTC}
      # Optional ownership override (useful on Synology)
      PUID: ${PUID:-100}
      PGID: ${PGID:-1000}
      # Unbind web interface (bound to 127.0.0.1 by default)
      STRMNTR_HOST: ${STRMNTR_HOST:-0.0.0.0}
      # Confirm delete behavior
      STRMNTR_CONFIRM_DEL: ${STRMNTR_CONFIRM_DEL:-MOBILE}
      # Refresh frequency on streamer page
      STRMNTR_STATUS_FREQ: ${STRMNTR_STATUS_FREQ:-5}
      # Refresh frequency on list page
      STRMNTR_LIST_FREQ: ${STRMNTR_LIST_FREQ:-30}
    volumes:
      # Set these paths in stack.env/.env for Portainer deployments.
      - ${DOWNLOADS_PATH:-./downloads}:/app/downloads
      - ${CONFIG_PATH:-./config.json}:/app/config.json
      - ${CONTROLLER_PATH:-./Controller.py}:/app/Controller.py
      - ${DOWNLOADER_PATH:-./Downloader.py}:/app/Downloader.py
      - ${PARAMETERS_PATH:-./parameters.py}:/app/parameters.py
      - ${STRIPCHAT_KEYS_PATH:-./stripchat_mouflon_keys.json}:/app/stripchat_mouflon_keys.json
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '${WEB_PORT:-5000}:5000'
