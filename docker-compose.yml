services:
  streamonitor:
    # Build the image from this repository's Dockerfile.
    # Portainer "Stack from Git" clones this repo, then `build.context: .`
    # tells Compose to build using the Dockerfile at the repo root.
    # `pull_policy: build` forces a rebuild on every redeploy so git changes
    # are actually picked up (matches the hint in the Portainer UI).
    build:
      context: .
      dockerfile: Dockerfile
    image: ${STREAMONITOR_IMAGE:-smonitor:local}
    pull_policy: build
    container_name: streamonitor
    restart: unless-stopped
    environment:
      # Timezone can be overridden from stack.env/.env
      TZ: ${TZ:-Etc/UTC}
      # Optional ownership override (useful on Synology)
      PUID: ${PUID:-100}
      PGID: ${PGID:-1000}
      # Unbind web interface (bound to 127.0.0.1 by default)
      STRMNTR_HOST: ${STRMNTR_HOST:-0.0.0.0}
      # Confirm delete behavior
      STRMNTR_CONFIRM_DEL: ${STRMNTR_CONFIRM_DEL:-MOBILE}
      # Refresh frequency on streamer page
      STRMNTR_STATUS_FREQ: ${STRMNTR_STATUS_FREQ:-5}
      # Refresh frequency on list page
      STRMNTR_LIST_FREQ: ${STRMNTR_LIST_FREQ:-30}
    volumes:
      # IMPORTANT for Portainer "Stack from Git":
      # Relative paths resolve inside Portainer's cloned copy of this repo,
      # which is wiped/replaced on every redeploy. For anything that must
      # persist (downloads, config.json), set ABSOLUTE host paths via the
      # Portainer stack "Environment variables" section, e.g.:
      #   DOWNLOADS_PATH=/srv/smonitor/downloads
      #   CONFIG_PATH=/srv/smonitor/config.json
      # The .py / .json overrides below are optional — the Dockerfile already
      # copies them into the image during build. Only set the *_PATH vars if
      # you want to override the versions baked into the image.
      - ${DOWNLOADS_PATH:-./downloads}:/app/downloads
      - ${CONFIG_PATH:-./config.json}:/app/config.json
      - ${CONTROLLER_PATH:-./Controller.py}:/app/Controller.py
      - ${DOWNLOADER_PATH:-./Downloader.py}:/app/Downloader.py
      - ${PARAMETERS_PATH:-./parameters.py}:/app/parameters.py
      - ${STRIPCHAT_KEYS_PATH:-./stripchat_mouflon_keys.json}:/app/stripchat_mouflon_keys.json
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '${WEB_PORT:-5000}:5000'
